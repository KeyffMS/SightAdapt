name: Validate and tag sequential releases

on:
  push:
    branches: ["release/audit-fixes"]

permissions:
  contents: write

jobs:
  release:
    if: startsWith(github.event.head_commit.message, 'Release ')
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve and verify release version
        shell: pwsh
        run: |
          $message = @'
          ${{ github.event.head_commit.message }}
          '@.Trim()
          $match = [regex]::Match($message, '^Release (?<version>0\.5\.0\.(?:1[6-9]|2[0-9]|30))(?::|$)')
          if (-not $match.Success) {
            throw "Release commit message must start with 'Release 0.5.0.16:' through 'Release 0.5.0.30:'."
          }

          [xml]$project = Get-Content -Raw 'src/SightAdapt/SightAdapt.csproj'
          $projectVersion = [string]$project.Project.PropertyGroup.Version
          $fileVersion = [string]$project.Project.PropertyGroup.FileVersion
          $informationalVersion = [string]$project.Project.PropertyGroup.InformationalVersion
          $version = $match.Groups['version'].Value

          if ($projectVersion -ne $version -or
              $fileVersion -ne $version -or
              $informationalVersion -ne $version) {
            throw "Commit version '$version' does not match project metadata: Version='$projectVersion', FileVersion='$fileVersion', InformationalVersion='$informationalVersion'."
          }

          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore application
        run: dotnet restore src/SightAdapt/SightAdapt.csproj

      - name: Restore tests
        run: dotnet restore tests/SightAdapt.Tests/SightAdapt.Tests.csproj

      - name: Build application
        run: dotnet build src/SightAdapt/SightAdapt.csproj --configuration Release --no-restore

      - name: Run complete regression suite
        run: dotnet test tests/SightAdapt.Tests/SightAdapt.Tests.csproj --configuration Release --no-restore

      - name: Publish self-contained Windows executable
        run: >-
          dotnet publish src/SightAdapt/SightAdapt.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output artifacts/win-x64

      - name: Create validated tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch --tags --force
          $existing = git rev-parse -q --verify "refs/tags/$env:RELEASE_VERSION^{}" 2>$null
          if ($LASTEXITCODE -eq 0) {
            if ($existing -ne $env:GITHUB_SHA) {
              throw "Tag $env:RELEASE_VERSION already exists at $existing, expected $env:GITHUB_SHA."
            }

            Write-Host "Tag $env:RELEASE_VERSION already points to this validated commit."
            exit 0
          }

          git tag -a $env:RELEASE_VERSION -m "SightAdapt $env:RELEASE_VERSION" $env:GITHUB_SHA
          git push origin "refs/tags/$env:RELEASE_VERSION"
