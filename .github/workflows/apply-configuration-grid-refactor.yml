name: Apply configuration grid refactor

on:
  push:
    branches:
      - agent/refactor-configuration-grid-v0.4

permissions:
  contents: write

jobs:
  apply-refactor:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out refactor branch
        uses: actions/checkout@v4
        with:
          ref: agent/refactor-configuration-grid-v0.4
          fetch-depth: 0

      - name: Apply focused refactor
        run: python tools/refactor_configuration_grid.py

      - name: Remove temporary automation
        run: |
          rm tools/refactor_configuration_grid.py
          rm .github/workflows/apply-configuration-grid-refactor.yml

      - name: Commit refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refactor configuration grid ownership"
          git push origin HEAD:agent/refactor-configuration-grid-v0.4
