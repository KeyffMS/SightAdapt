name: Create validated audit release tags

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  tag:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/create-audit-release-tags'
    runs-on: ubuntu-latest

    steps:
      - name: Check out full history
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify commits and create release tags
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          create_tag() {
            local tag="$1"
            local commit="$2"

            if ! git cat-file -e "${commit}^{commit}"; then
              echo "Missing release commit ${commit} for ${tag}." >&2
              exit 1
            fi

            local project
            project="$(git show "${commit}:src/SightAdapt/SightAdapt.csproj")"
            grep -Fq "<Version>${tag}</Version>" <<<"${project}"
            grep -Fq "<FileVersion>${tag}</FileVersion>" <<<"${project}"
            grep -Fq "<InformationalVersion>${tag}</InformationalVersion>" <<<"${project}"

            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              local existing
              existing="$(git rev-list -n 1 "${tag}")"
              if [[ "${existing}" != "${commit}" ]]; then
                echo "Tag ${tag} already points to ${existing}, expected ${commit}." >&2
                exit 1
              fi
              echo "Tag ${tag} already exists at the validated commit."
              return
            fi

            git tag -a "${tag}" "${commit}" -m "SightAdapt ${tag}"
            git push origin "refs/tags/${tag}"
          }

          create_tag 0.5.0.31 af7d8a20b51ad587dab5cf279d15c7cd952af1aa
          create_tag 0.5.0.32 bccd6d2046726803e7ec67c88bc03a7d97ce56cc
          create_tag 0.5.0.33 d8f5e41be042371f38207693a6dd1c578a6d5547
          create_tag 0.5.0.34 f502b11221578a9686be42c2626313eb973b60dd
