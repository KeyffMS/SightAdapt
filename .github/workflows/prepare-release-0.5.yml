name: Prepare SightAdapt 0.5 Alpha

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  prepare:
    if: ${{ github.actor != 'github-actions[bot]' && github.head_ref == 'release/0.5-alpha' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          ref: release/0.5-alpha
          fetch-depth: 0

      - name: Prepare release tree
        run: python tools/prepare_release_0_5.py

      - name: Keep workflow files outside the automated commit
        run: git checkout HEAD -- .github/workflows

      - name: Commit release code and documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          git commit -m "Prepare SightAdapt 0.5 Alpha"
          git push origin HEAD:release/0.5-alpha
