name: Prepare SightAdapt 0.5 Alpha

on:
  push:
    branches: ["release/0.5-alpha"]

permissions:
  contents: write

jobs:
  prepare:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          ref: release/0.5-alpha
          fetch-depth: 0

      - name: Prepare release tree
        run: python tools/prepare_release_0_5.py

      - name: Remove temporary preparation files
        run: |
          rm -f .github/workflows/prepare-release-0.5.yml
          rm -f tools/prepare_release_0_5.py

      - name: Commit release preparation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Prepare SightAdapt 0.5 Alpha"
          git push origin HEAD:release/0.5-alpha
