name: Prepare SightAdapt 0.5 Alpha

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  prepare:
    if: ${{ github.head_ref == 'release/0.5-alpha' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          ref: release/0.5-alpha
          fetch-depth: 0

      - name: Prepare release tree
        run: python tools/prepare_release_0_5.py

      - name: Remove temporary preparation files
        run: |
          rm -f .github/workflows/prepare-release-0.5.yml
          rm -f tools/prepare_release_0_5.py
          git add -A

      - name: Package final tracked tree
        shell: bash
        run: |
          mkdir -p release-package/tree
          git ls-files -s -z > release-package/index.z
          python - <<'PY'
          from pathlib import Path
          import shutil
          import subprocess

          root = Path.cwd()
          package = root / 'release-package' / 'tree'
          paths = subprocess.run(
              ['git', 'ls-files', '-z'],
              check=True,
              capture_output=True,
          ).stdout.split(b'\0')
          for raw in paths:
              if not raw:
                  continue
              relative = raw.decode('utf-8')
              source = root / relative
              target = package / relative
              target.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(source, target)
          PY

      - name: Upload prepared release tree
        uses: actions/upload-artifact@v4
        with:
          name: SightAdapt-0.5-release-tree
          path: release-package/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1
