name: Finalize configuration grid refactor

on:
  push:
    branches:
      - agent/refactor-configuration-grid-v0.4

permissions:
  contents: write

jobs:
  finalize-refactor:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out refactor branch
        uses: actions/checkout@v4
        with:
          ref: agent/refactor-configuration-grid-v0.4
          fetch-depth: 0

      - name: Update architecture tests
        run: python tools/update_architecture_tests.py

      - name: Finalize grid component
        run: python tools/finalize_grid_component.py

      - name: Remove temporary automation
        run: |
          rm tools/update_architecture_tests.py
          rm tools/finalize_grid_component.py
          rm .github/workflows/finalize-configuration-grid-refactor.yml

      - name: Commit final refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align architecture tests with grid ownership"
          git push origin HEAD:agent/refactor-configuration-grid-v0.4
