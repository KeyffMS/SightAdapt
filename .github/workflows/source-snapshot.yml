name: Temporary source snapshot

on:
  push:
    branches: [agent/final-ui-cleanup]

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Upload UI source files
        uses: actions/upload-artifact@v4
        with:
          name: SightAdapt-ui-source-snapshot
          path: |
            src/SightAdapt/ConfigurationForm.cs
            src/SightAdapt/ModernTheme.cs
            src/SightAdapt/ModernSelectorComboBoxColumn.cs
            src/SightAdapt/SightAdapt.csproj
            tests/SightAdapt.Tests/ArchitectureComplianceTests.cs
          if-no-files-found: error
          retention-days: 1
