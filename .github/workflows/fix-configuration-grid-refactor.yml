name: Fix configuration grid refactor

on:
  push:
    branches:
      - agent/refactor-configuration-grid-v0.4

permissions:
  contents: write

jobs:
  fix-refactor:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out refactor branch
        uses: actions/checkout@v4
        with:
          ref: agent/refactor-configuration-grid-v0.4
          fetch-depth: 0

      - name: Fix transformation artifacts
        run: python tools/fix_configuration_grid_refactor.py

      - name: Remove temporary automation
        run: |
          rm tools/fix_configuration_grid_refactor.py
          rm .github/workflows/fix-configuration-grid-refactor.yml

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix configuration grid refactor syntax"
          git push origin HEAD:agent/refactor-configuration-grid-v0.4
