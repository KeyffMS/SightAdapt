name: Build and test SightAdapt

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main, "agent/**"]

permissions:
  contents: write

jobs:
  apply-issue-8:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out issue 8 branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-8-overlay-scope-per-app-v0.4
          fetch-depth: 0

      - name: Apply runtime and model changes
        run: python tools/issue8_model_runtime.py

      - name: Apply UI and regression changes
        id: ui_transform
        continue-on-error: true
        run: python tools/issue8_ui_tests.py 2>&1 | tee issue8-transform.log

      - name: Upload transform diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SightAdapt-issue8-transform-diagnostics
          path: issue8-transform.log
          if-no-files-found: warn
          retention-days: 7

      - name: Stop after transform failure
        if: steps.ui_transform.outcome == 'failure'
        run: exit 1

      - name: Restore normal workflow and remove temporary automation
        run: |
          git checkout 5f94f87587f13aacfad85daddfa1656af106d49a -- .github/workflows/build.yml
          rm -f .github/workflows/apply-issue-8-overlay-scope.yml
          rm tools/issue8_model_runtime.py
          rm tools/issue8_ui_tests.py

      - name: Commit issue 8 implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement per-application overlay scope"
          git push origin HEAD:agent/issue-8-overlay-scope-per-app-v0.4

  build:
    if: ${{ github.actor == 'github-actions[bot]' }}
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore application
        run: dotnet restore src/SightAdapt.Demo/SightAdapt.Demo.csproj

      - name: Restore tests
        run: dotnet restore tests/SightAdapt.Tests/SightAdapt.Tests.csproj

      - name: Build
        shell: pwsh
        run: |
          $output = & dotnet build src/SightAdapt.Demo/SightAdapt.Demo.csproj --configuration Release --no-restore 2>&1
          $exitCode = $LASTEXITCODE
          $output | Set-Content -Path build-output.txt -Encoding utf8
          $output | ForEach-Object { Write-Host $_ }
          exit $exitCode

      - name: Test
        shell: pwsh
        run: |
          $output = & dotnet test tests/SightAdapt.Tests/SightAdapt.Tests.csproj --configuration Release --no-restore 2>&1
          $exitCode = $LASTEXITCODE
          $output | Set-Content -Path test-output.txt -Encoding utf8
          $output | ForEach-Object { Write-Host $_ }
          exit $exitCode

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SightAdapt-build-diagnostics
          path: |
            build-output.txt
            test-output.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Publish self-contained alpha
        run: >-
          dotnet publish src/SightAdapt.Demo/SightAdapt.Demo.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output artifacts/win-x64

      - name: Upload Windows alpha
        uses: actions/upload-artifact@v4
        with:
          name: SightAdapt-0.4-Alpha-win-x64
          path: artifacts/win-x64/
          if-no-files-found: error
