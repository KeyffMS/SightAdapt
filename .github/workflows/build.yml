name: Build and test SightAdapt

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main, "agent/**"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Integrate 0.4A.2 profile manager
        if: github.event_name == 'push' && github.ref == 'refs/heads/agent/alpha-v0.4'
        shell: pwsh
        run: |
          $path = "src/SightAdapt.Demo/ConfigurationForm.cs"
          $text = Get-Content -Path $path -Raw

          if ($text -notmatch "ManageVisualProfiles") {
            $text = $text.Replace(
              '            Text = "Assign visual correction profiles and tune Soft Invert output for each Windows application.",',
              '            Text = "Assign and manage independent visual correction profiles for each Windows application.",')

            $browseBlock = @'
                  browseButton.Click += (_, _) => BrowseForApplication();

                  var removeButton = new ModernButton
          '@
            $manageBlock = @'
                  browseButton.Click += (_, _) => BrowseForApplication();

                  var manageProfilesButton = new ModernButton
                  {
                      Text = "Manage profiles",
                      VisualStyle = ModernButtonStyle.Secondary,
                      MinimumSize = new Size(145, 40),
                      Margin = new Padding(0, 0, 8, 0),
                  };
                  manageProfilesButton.Click += (_, _) => ManageVisualProfiles();

                  var removeButton = new ModernButton
          '@
            $text = $text.Replace($browseBlock.Trim(), $manageBlock.Trim())

            $controlsBlock = @'
                      addCurrentButton,
                      browseButton,
                      _editVisualProfileButton,
          '@
            $controlsReplacement = @'
                      addCurrentButton,
                      browseButton,
                      manageProfilesButton,
                      _editVisualProfileButton,
          '@
            $text = $text.Replace($controlsBlock.Trim(), $controlsReplacement.Trim())

            $methodAnchor = @'
              private ApplicationProfile? GetSelectedApplicationProfile()
              {
          '@
            $method = @'
              private void ManageVisualProfiles()
              {
                  VisualProfileManagerForm.ShowManager(
                      this,
                      _settings,
                      _settingsChanged);
                  RefreshProfiles();
              }

              private ApplicationProfile? GetSelectedApplicationProfile()
              {
          '@
            $text = $text.Replace($methodAnchor.Trim(), $method.Trim())

            if ($text -notmatch "manageProfilesButton" -or $text -notmatch "private void ManageVisualProfiles") {
              throw "ConfigurationForm integration failed."
            }

            Set-Content -Path $path -Value $text -Encoding utf8 -NoNewline
            git config user.name "SightAdapt automation"
            git config user.email "actions@users.noreply.github.com"
            git add $path
            git commit -m "Integrate user visual profile manager [0.4A.2 UI]"
            git push origin HEAD:agent/alpha-v0.4
          }

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore application
        run: dotnet restore src/SightAdapt.Demo/SightAdapt.Demo.csproj

      - name: Restore tests
        run: dotnet restore tests/SightAdapt.Tests/SightAdapt.Tests.csproj

      - name: Build
        shell: pwsh
        run: |
          $output = & dotnet build src/SightAdapt.Demo/SightAdapt.Demo.csproj --configuration Release --no-restore 2>&1
          $exitCode = $LASTEXITCODE
          $output | Set-Content -Path build-output.txt -Encoding utf8
          $output | ForEach-Object { Write-Host $_ }
          exit $exitCode

      - name: Test
        shell: pwsh
        run: |
          $output = & dotnet test tests/SightAdapt.Tests/SightAdapt.Tests.csproj --configuration Release --no-restore 2>&1
          $exitCode = $LASTEXITCODE
          $output | Set-Content -Path test-output.txt -Encoding utf8
          $output | ForEach-Object { Write-Host $_ }
          exit $exitCode

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SightAdapt-build-diagnostics
          path: |
            build-output.txt
            test-output.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Publish self-contained alpha
        run: >-
          dotnet publish src/SightAdapt.Demo/SightAdapt.Demo.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output artifacts/win-x64

      - name: Upload Windows alpha
        uses: actions/upload-artifact@v4
        with:
          name: SightAdapt-0.4-Alpha-win-x64
          path: artifacts/win-x64/
          if-no-files-found: error
