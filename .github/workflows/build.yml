name: Build demo

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main, "agent/**"]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/SightAdapt.Demo/SightAdapt.Demo.csproj

      - name: Build
        shell: pwsh
        run: |
          $output = & dotnet build src/SightAdapt.Demo/SightAdapt.Demo.csproj --configuration Release --no-restore 2>&1
          $exitCode = $LASTEXITCODE
          $output | Set-Content -Path build-output.txt -Encoding utf8
          $output | ForEach-Object { Write-Host $_ }
          exit $exitCode

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SightAdapt-build-diagnostics
          path: build-output.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Publish self-contained demo
        run: >-
          dotnet publish src/SightAdapt.Demo/SightAdapt.Demo.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output artifacts/win-x64

      - name: Upload Windows demo
        uses: actions/upload-artifact@v4
        with:
          name: SightAdapt-Demo-0.2-win-x64
          path: artifacts/win-x64/
          if-no-files-found: error
