name: Build and test SightAdapt

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore application
        run: dotnet restore src/SightAdapt/SightAdapt.csproj

      - name: Restore tests
        run: dotnet restore tests/SightAdapt.Tests/SightAdapt.Tests.csproj

      - name: Build
        shell: pwsh
        run: |
          $output = & dotnet build src/SightAdapt/SightAdapt.csproj --configuration Release --no-restore 2>&1
          $exitCode = $LASTEXITCODE
          $output | Set-Content -Path build-output.txt -Encoding utf8
          $output | ForEach-Object { Write-Host $_ }
          exit $exitCode

      - name: Test
        shell: pwsh
        run: |
          $output = & dotnet test tests/SightAdapt.Tests/SightAdapt.Tests.csproj --configuration Release --no-restore 2>&1
          $exitCode = $LASTEXITCODE
          $output | Set-Content -Path test-output.txt -Encoding utf8
          $output | ForEach-Object { Write-Host $_ }
          exit $exitCode

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SightAdapt-build-diagnostics
          path: |
            build-output.txt
            test-output.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Publish self-contained alpha
        run: >-
          dotnet publish src/SightAdapt/SightAdapt.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output artifacts/win-x64

      - name: Upload Windows alpha
        uses: actions/upload-artifact@v4
        with:
          name: SightAdapt-0.5-Alpha-win-x64
          path: artifacts/win-x64/
          if-no-files-found: error

  audit-release:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'release/audit-fixes'
    runs-on: windows-latest

    steps:
      - name: Check out requested branch revision
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect queued release request
        id: gate
        shell: pwsh
        run: |
          $message = (git log -1 --pretty=%B).Trim()
          $queued = $message.StartsWith('Queue ', [System.StringComparison]::Ordinal)
          "queued=$($queued.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          if (-not $queued) {
            Write-Host 'The head commit is not a queued release request.'
          }

      - name: Set up .NET
        if: steps.gate.outputs.queued == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve release request
        if: steps.gate.outputs.queued == 'true'
        shell: pwsh
        run: |
          $requestPath = '.github/audit-release-request.json'
          $changeScriptPath = '.github/audit-release.ps1'
          if (-not (Test-Path $requestPath) -or -not (Test-Path $changeScriptPath)) {
            throw 'Both audit-release-request.json and audit-release.ps1 are required.'
          }

          $request = Get-Content -Raw $requestPath | ConvertFrom-Json
          $version = [string]$request.version
          $issue = [int]$request.issue
          $title = ([string]$request.title).Trim()

          if ($version -notmatch '^0\.5\.0\.(?:1[6-9]|2[0-9]|30)$') {
            throw "Unsupported sequential version '$version'."
          }

          $versionIssue = [int]($version.Split('.')[-1])
          if ($issue -ne $versionIssue) {
            throw "Issue #$issue must map to version $version."
          }

          if ([string]::IsNullOrWhiteSpace($title)) {
            throw 'Release title is required.'
          }

          git fetch --tags --force
          [string]$existingTag = git tag --list $version
          if (-not [string]::IsNullOrWhiteSpace($existingTag)) {
            throw "Tag $version already exists."
          }

          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_ISSUE=$issue" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TITLE=$title" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Apply requested source changes
        if: steps.gate.outputs.queued == 'true'
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          & .github/audit-release.ps1
          git diff --check
          if ($LASTEXITCODE -ne 0) {
            throw 'The resulting source diff contains whitespace errors.'
          }

      - name: Update project version metadata
        if: steps.gate.outputs.queued == 'true'
        shell: pwsh
        run: |
          $path = 'src/SightAdapt/SightAdapt.csproj'
          $content = Get-Content -Raw $path
          $content = [regex]::Replace($content, '<Version>[^<]+</Version>', "<Version>$env:RELEASE_VERSION</Version>", 1)
          $content = [regex]::Replace($content, '<FileVersion>[^<]+</FileVersion>', "<FileVersion>$env:RELEASE_VERSION</FileVersion>", 1)
          $content = [regex]::Replace($content, '<InformationalVersion>[^<]+</InformationalVersion>', "<InformationalVersion>$env:RELEASE_VERSION</InformationalVersion>", 1)
          $utf8 = [System.Text.UTF8Encoding]::new($false)
          [System.IO.File]::WriteAllText($path, $content, $utf8)

          [xml]$project = Get-Content -Raw $path
          if ([string]$project.Project.PropertyGroup.Version -ne $env:RELEASE_VERSION -or
              [string]$project.Project.PropertyGroup.FileVersion -ne $env:RELEASE_VERSION -or
              [string]$project.Project.PropertyGroup.InformationalVersion -ne $env:RELEASE_VERSION) {
            throw 'Project version metadata was not updated consistently.'
          }

      - name: Remove consumed release request
        if: steps.gate.outputs.queued == 'true'
        shell: pwsh
        run: |
          Remove-Item .github/audit-release-request.json
          Remove-Item .github/audit-release.ps1
          if (Test-Path .github/audit-release.patch) {
            Remove-Item .github/audit-release.patch
          }

          git diff --check
          if ($LASTEXITCODE -ne 0) {
            throw 'The resulting source diff contains whitespace errors.'
          }

          if ([string]::IsNullOrWhiteSpace((git status --porcelain))) {
            throw 'The release request produced no repository changes.'
          }

      - name: Restore application
        if: steps.gate.outputs.queued == 'true'
        run: dotnet restore src/SightAdapt/SightAdapt.csproj

      - name: Restore tests
        if: steps.gate.outputs.queued == 'true'
        run: dotnet restore tests/SightAdapt.Tests/SightAdapt.Tests.csproj

      - name: Build application
        if: steps.gate.outputs.queued == 'true'
        shell: pwsh
        run: |
          $output = & dotnet build src/SightAdapt/SightAdapt.csproj --configuration Release --no-restore 2>&1
          $exitCode = $LASTEXITCODE
          $output | Set-Content -Path audit-build-output.txt -Encoding utf8
          $output | ForEach-Object { Write-Host $_ }
          exit $exitCode

      - name: Run complete regression suite
        if: steps.gate.outputs.queued == 'true'
        shell: pwsh
        run: |
          $output = & dotnet test tests/SightAdapt.Tests/SightAdapt.Tests.csproj --configuration Release --no-restore 2>&1
          $exitCode = $LASTEXITCODE
          $output | Set-Content -Path audit-test-output.txt -Encoding utf8
          $output | ForEach-Object { Write-Host $_ }
          exit $exitCode

      - name: Upload audit release diagnostics
        if: always() && steps.gate.outputs.queued == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: SightAdapt-audit-release-diagnostics-${{ github.run_id }}
          path: |
            audit-build-output.txt
            audit-test-output.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Publish self-contained Windows executable
        if: steps.gate.outputs.queued == 'true'
        run: >-
          dotnet publish src/SightAdapt/SightAdapt.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output artifacts/win-x64

      - name: Commit and tag validated release
        if: steps.gate.outputs.queued == 'true'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          $message = "Release $($env:RELEASE_VERSION): Fix #$($env:RELEASE_ISSUE) - $($env:RELEASE_TITLE)"
          git commit -m $message
          if ($LASTEXITCODE -ne 0) {
            throw 'Could not create the validated release commit.'
          }

          $releaseSha = (git rev-parse HEAD).Trim()
          git tag -a $env:RELEASE_VERSION -m "SightAdapt $env:RELEASE_VERSION" $releaseSha
          if ($LASTEXITCODE -ne 0) {
            throw "Could not create tag $env:RELEASE_VERSION."
          }

          git push origin "HEAD:release/audit-fixes"
          if ($LASTEXITCODE -ne 0) {
            throw 'Could not push the validated release commit.'
          }

          git push origin "refs/tags/$env:RELEASE_VERSION"
          if ($LASTEXITCODE -ne 0) {
            throw "Could not push tag $env:RELEASE_VERSION."
          }
