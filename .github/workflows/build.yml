name: Build demo

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/SightAdapt.Demo/SightAdapt.Demo.csproj

      - name: Build
        run: dotnet build src/SightAdapt.Demo/SightAdapt.Demo.csproj --configuration Release --no-restore

      - name: Publish self-contained demo
        run: >-
          dotnet publish src/SightAdapt.Demo/SightAdapt.Demo.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output artifacts/win-x64

      - name: Upload Windows demo
        uses: actions/upload-artifact@v4
        with:
          name: SightAdapt-Demo-win-x64
          path: artifacts/win-x64/
          if-no-files-found: error
